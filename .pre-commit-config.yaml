# Single entry point: pre-commit runs `dev.py check` (= lint + test), the
# same gate CI runs. No per-hook logic here (dev-script spec).
repos:
  - repo: local
    hooks:
      - id: dev-check
        name: dev.py check
        entry: python3
        args: [dev.py, check]
        language: system
        pass_filenames: false
        always_run: true
