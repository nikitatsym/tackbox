rules:
  - id: erc006-fingerprint-secret-arg
    message: >-
      Capture arg $ID is a secret-named identifier; must not reach
      message/tags/dedupKey
    severity: ERROR
    languages: [go, python, javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: sentryErr($...A, $X, $...B)
          - pattern: SentryErr($...A, $X, $...B)
          - pattern: Warn($...A, $X, $...B)
          - pattern: Panic($...A, $X, $...B)
          - pattern: reportError($...A, $X, $...B)
          - pattern: reportWarn($...A, $X, $...B)
          - pattern: reportSynth($...A, $X, $...B)
          - pattern: reportSynthError($...A, $X, $...B)
          - pattern: reportApiError($...A, $X, $...B)
          - pattern: reportLayerError($...A, $X, $...B)
      - metavariable-pattern:
          metavariable: $X
          patterns:
            - pattern: <... $ID ...>
            - metavariable-regex:
                metavariable: $ID
                regex: '(?i)^[a-z0-9_.]*(token|password|key|secret|cookie)[a-z0-9_.]*(\(\))?$'
