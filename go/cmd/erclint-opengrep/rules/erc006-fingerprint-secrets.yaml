rules:
  - id: erc006-fingerprint-secret-arg
    message: >-
      Capture argument references a secret-named identifier ($X).
      Stop-words: token, password, key, secret, cookie. These must
      never reach a Sentry fingerprint, tag, or dedupKey.
    severity: ERROR
    languages: [go, python, javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: sentryErr($...A, $X, $...B)
          - pattern: SentryErr($...A, $X, $...B)
          - pattern: Warn($...A, $X, $...B)
          - pattern: Panic($...A, $X, $...B)
          - pattern: reportError($...A, $X, $...B)
          - pattern: reportWarn($...A, $X, $...B)
          - pattern: reportSynth($...A, $X, $...B)
          - pattern: reportSynthError($...A, $X, $...B)
          - pattern: reportApiError($...A, $X, $...B)
          - pattern: reportLayerError($...A, $X, $...B)
      - metavariable-regex:
          metavariable: $X
          regex: '(?i)(token|password|secret|cookie|key)'

  - id: erc006-fingerprint-secret-string
    message: >-
      Capture argument contains a secret stop-word inside a string
      literal. Stop-words: token, password, key, secret, cookie.
    severity: ERROR
    languages: [go, python, javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: sentryErr($...A, "$STR", $...B)
          - pattern: SentryErr($...A, "$STR", $...B)
          - pattern: Warn($...A, "$STR", $...B)
          - pattern: Panic($...A, "$STR", $...B)
          - pattern: reportError($...A, "$STR", $...B)
          - pattern: reportWarn($...A, "$STR", $...B)
          - pattern: reportSynth($...A, "$STR", $...B)
          - pattern: reportSynthError($...A, "$STR", $...B)
          - pattern: reportApiError($...A, "$STR", $...B)
          - pattern: reportLayerError($...A, "$STR", $...B)
      - metavariable-regex:
          metavariable: $STR
          regex: '(?i)(token|password|key|secret|cookie)'
