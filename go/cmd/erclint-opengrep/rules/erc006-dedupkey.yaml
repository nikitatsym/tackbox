rules:
  - id: erc006-dedupkey-missing
    message: >-
      Capture call must have exactly 5 args: (ctx, msg, err, tags, dedupKey)
    severity: ERROR
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: sentryErr(...)
          - pattern: SentryErr(...)
          - pattern: Warn(...)
      - pattern-not: sentryErr($CTX, $MSG, $ERR, $TAGS, $KEY)
      - pattern-not: SentryErr($CTX, $MSG, $ERR, $TAGS, $KEY)
      - pattern-not: Warn($CTX, $MSG, $ERR, $TAGS, $KEY)

  - id: erc006-dedupkey-not-literal
    message: >-
      dedupKey (last arg) must be a string literal so the
      fingerprint is stable across calls.
    severity: ERROR
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: sentryErr($CTX, $MSG, $ERR, $TAGS, $KEY)
          - pattern: SentryErr($CTX, $MSG, $ERR, $TAGS, $KEY)
          - pattern: Warn($CTX, $MSG, $ERR, $TAGS, $KEY)
      - pattern-not: sentryErr($CTX, $MSG, $ERR, $TAGS, "...")
      - pattern-not: SentryErr($CTX, $MSG, $ERR, $TAGS, "...")
      - pattern-not: Warn($CTX, $MSG, $ERR, $TAGS, "...")

  - id: erc006-dedupkey-bad-format
    message: >-
      dedupKey must match area.suffix[:identifier], lowercase, single optional :id
    severity: ERROR
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: sentryErr($CTX, $MSG, $ERR, $TAGS, "$KEY")
          - pattern: SentryErr($CTX, $MSG, $ERR, $TAGS, "$KEY")
          - pattern: Warn($CTX, $MSG, $ERR, $TAGS, "$KEY")
      - metavariable-regex:
          metavariable: $KEY
          regex: '^(?![a-z][a-z0-9_-]*\.[a-z][a-z0-9_-]*(:[a-zA-Z0-9_.-]+)?$).*$'
