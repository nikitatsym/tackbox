# recover-swallow is enforced natively by ERC007 (analyzers/recoverswallow).
# go-exit-in-recover below is the separate os.Exit-inside-recover guard.
rules:
  - id: go-exit-in-recover
    languages: [go]
    severity: ERROR
    message: |
      `os.Exit(...)` inside `recover` masks the panic. Re-`panic($R)`
      so the original stack is visible.
    pattern: |
      if $R := recover(); $R != nil {
        ...
        os.Exit(...)
        ...
      }
