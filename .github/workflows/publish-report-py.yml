name: publish-report-py

# Publishes the Python runtime helper `tackbox-report` (py/tackbox_report) to
# PyPI via Trusted Publishing (OIDC, no stored token). Decoupled from the
# linter's publish.yml: fires only on its own `report-py-v*` tag, never on push
# to main.
on:
  push:
    tags: ['report-py-v*']
  workflow_dispatch:

permissions: {}

# One publish at a time: PyPI OIDC issuance is per-run and a second upload of an
# existing version 409s.
concurrency:
  group: publish-report-py
  cancel-in-progress: false

jobs:
  publish:
    name: build + publish tackbox-report to PyPI
    runs-on: ubuntu-latest
    # PyPI Trusted Publisher tuple is (owner, repo, workflow, environment); the
    # pending publisher on pypi.org must name this environment.
    environment: pypi
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
      contents: read    # checkout
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      # Test gate: never publish an untested runtime helper. Runs the standalone
      # tackbox_report suite via its PEP 735 dev group before build + publish.
      - name: Test tackbox-report
        run: uv run --directory py/tackbox_report --group dev pytest -q

      # Version is taken from pyproject.toml (0.1.0). The tag is only the
      # trigger; it is not injected into the build.
      - name: Build sdist + wheel
        working-directory: py/tackbox_report
        run: |
          set -euo pipefail
          python -m pip install --upgrade build
          python -m build --outdir dist
          ls -lh dist/

      - name: Publish to PyPI via Trusted Publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0 (release/v1 @ 2026-02-18)
        with:
          packages-dir: py/tackbox_report/dist
