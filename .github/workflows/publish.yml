name: publish

on:
  push:
    tags: ['v*']

# Two rapid tag pushes must serialize on the Trusted Publisher: PyPI OIDC
# issuance is per-workflow-run, and cancel-in-progress would abort a live
# upload and leak a half-published fat with no matching thin.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  lock-check:
    name: engines/lock.json drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify engines/lock.json matches sources
        run: python scripts/lock_engines.py --check

  build:
    name: build ${{ matrix.platform }}
    needs: lock-check
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-22.04
          - platform: linux-aarch64
            runner: ubuntu-22.04-arm
          - platform: macos-aarch64
            runner: macos-14
          - platform: windows-x86_64
            runner: windows-2022
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # build_wheels.py packs the shaded javalint.jar via `mvn package`; maven
      # is pre-installed on all runner images, setup-java supplies the JDK.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@v8.3.0

      - name: Resolve versions from tag and engines/VERSION
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          thin_version="${tag#v}"
          engines_version="$(cat engines/VERSION | tr -d '[:space:]')"
          echo "thin=$thin_version"        >> "$GITHUB_OUTPUT"
          echo "engines=$engines_version"  >> "$GITHUB_OUTPUT"
          echo "thin version=$thin_version, engines version=$engines_version"

      - name: Build wheels for ${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_wheels.py \
            --outdir dist \
            --version "${{ steps.ver.outputs.thin }}" \
            --engines-version "${{ steps.ver.outputs.engines }}" \
            --platform ${{ matrix.platform }}
          ls -lh dist/

      - name: Enforce PyPI 100 MiB per-file limit
        shell: bash
        run: |
          set -euo pipefail
          limit=$((100 * 1024 * 1024))
          fail=0
          for w in dist/*.whl; do
            size=$(wc -c <"$w")
            printf '%s\t%s bytes\n' "$w" "$size"
            if [ "$size" -gt "$limit" ]; then
              echo "wheel $w exceeds PyPI 100 MiB per-file limit: $size bytes" >&2
              fail=1
            fi
          done
          exit "$fail"

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  smoke:
    name: smoke ${{ matrix.platform }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-22.04
          - platform: linux-aarch64
            runner: ubuntu-22.04-arm
          - platform: macos-aarch64
            runner: macos-14
          - platform: windows-x86_64
            runner: windows-2022
    steps:
      - uses: actions/checkout@v7

      # macos-14 does not ship Go by default; the fixture repo has .go files,
      # and `tackbox doctor` fails go-toolchain check without it.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: astral-sh/setup-uv@v8.3.0

      - name: Download platform wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-${{ matrix.platform }}
          path: dist

      # doctor's java-toolchain check needs a JDK >= 17 wherever doctor runs.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Install thin wheel; stage engines payload from the built fat wheel
        shell: bash
        run: |
          set -euo pipefail
          # ubuntu-22.04 ships Python 3.10; tackbox requires >=3.11.
          uv venv --python 3.11 .smoke-venv
          fat=$(ls dist/tackbox_engines-*.whl | head -n1)
          thin=$(ls dist/tackbox-*.whl | grep -v tackbox_engines | head -n1)
          echo "fat=$fat"
          echo "thin=$thin"
          # Thin installs alone: F6 dropped the fat pip dependency.
          uv pip install --python .smoke-venv "$thin"
          # The store can't fetch an unpublished version; supply the payload by
          # unpacking the just-built fat wheel and overriding TACKBOX_ENGINES_DIR.
          python -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]).extractall('engines-payload')" "$fat"
          chmod -R u+x engines-payload/tackbox_engines/bin || true
          echo "TACKBOX_ENGINES_DIR=$PWD/engines-payload/tackbox_engines" >> "$GITHUB_ENV"

      - name: Materialize fixture repo
        shell: bash
        run: |
          set -euo pipefail
          rm -rf fixture-repo
          python scripts/materialize_fixture.py fixture-repo

      - name: tackbox doctor (expect exit 0)
        shell: bash
        working-directory: fixture-repo
        run: |
          set -euo pipefail
          if [ -f ../.smoke-venv/bin/tackbox ]; then
            tackbox=../.smoke-venv/bin/tackbox
          elif [ -f ../.smoke-venv/Scripts/tackbox.exe ]; then
            tackbox=../.smoke-venv/Scripts/tackbox.exe
          else
            echo "no tackbox entrypoint found under .smoke-venv/" >&2
            exit 1
          fi
          "$tackbox" doctor

      - name: tackbox lint (expect exit 1 on planted violations)
        shell: bash
        working-directory: fixture-repo
        run: |
          set -eo pipefail
          if [ -f ../.smoke-venv/bin/tackbox ]; then
            tackbox=../.smoke-venv/bin/tackbox
          elif [ -f ../.smoke-venv/Scripts/tackbox.exe ]; then
            tackbox=../.smoke-venv/Scripts/tackbox.exe
          else
            echo "no tackbox entrypoint found under .smoke-venv/" >&2
            exit 1
          fi
          set +e
          "$tackbox" lint . --no-cache
          rc=$?
          set -e
          echo "lint exit=$rc"
          if [ "$rc" != "1" ]; then
            echo "expected exit 1 (planted ERC001+no-swallow-catch+MD-ASCII), got $rc" >&2
            exit 1
          fi

  publish-fat:
    name: publish tackbox_engines to PyPI
    needs: smoke
    runs-on: ubuntu-latest
    # PyPI Trusted Publishers rejects two pending TPs with the same
    # (owner, repo, workflow, environment) tuple: the OIDC subject cannot
    # disambiguate between project names. tackbox-engines gets its own env.
    environment: pypi-engines
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all fat wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Isolate fat wheels
        shell: bash
        run: |
          set -euo pipefail
          mkdir fat
          for w in dist/tackbox_engines-*.whl; do
            mv "$w" fat/
          done
          ls -lh fat/

      # A thin-only patch bump reuploads the same fat version; PyPI 409s
      # on identical version, and skip-existing turns that 409 into success.
      - name: Publish tackbox-engines via Trusted Publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: fat
          skip-existing: true

  publish-thin:
    name: publish tackbox to PyPI
    needs: publish-fat
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all thin wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Isolate thin wheels
        shell: bash
        run: |
          set -euo pipefail
          mkdir thin
          # dist/tackbox-*.whl does not match tackbox_engines-*.whl (underscore
          # separator after the package name), so no fat filter is needed.
          for w in dist/tackbox-*.whl; do
            mv "$w" thin/
          done
          ls -lh thin/

      - name: Publish tackbox via Trusted Publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: thin

  github-release:
    name: GitHub release for the tag
    needs: publish-thin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Idempotent: a re-run of later jobs must not fail on the existing release.
      - name: Create release if absent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "release $tag already exists"
            exit 0
          fi
          gh release create "$tag" --repo "${GITHUB_REPOSITORY}" --title "$tag" \
            --notes "PyPI: https://pypi.org/project/tackbox/${tag#v}/"
