name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      # javalint builds/tests under dev.py check (mvn verify); maven is
      # pre-installed on the runner, setup-java supplies the JDK it needs.
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      # opengrep must be on PATH: dev.py lint (erclint-opengrep) and the go
      # hardening tests both shell out to it. Pin version + sha256 from
      # engines/manifest.json (single source of truth), verify before chmod;
      # never run an unverified releases/latest binary.
      - name: Install opengrep
        run: |
          set -euo pipefail
          url=$(jq -r '.platforms."linux-x86_64".opengrep.source_url' engines/manifest.json)
          sha=$(jq -r '.platforms."linux-x86_64".opengrep.archive_sha256' engines/manifest.json)
          curl -fsSL "$url" -o /usr/local/bin/opengrep
          echo "${sha}  /usr/local/bin/opengrep" | sha256sum -c -
          chmod +x /usr/local/bin/opengrep
          opengrep --version
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      # Same gate as the local pre-commit hook: dev.py check = lint + test.
      - run: python3 dev.py check

  tag:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ssh-key = deploy key with write access. A tag pushed via the default
      # GITHUB_TOKEN does not trigger downstream workflows (documented
      # anti-recursion rule), so publish.yml would never wake on tag events
      # produced by this job. Deploy key is scoped to this repo, no user PAT.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_TAG_KEY }}
      - name: Bump and push tag
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          latest=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            ver=${latest#v}
            major=${ver%%.*}
            rest=${ver#*.}
            minor=${rest%%.*}
            patch=${rest#*.}
            case "$BUMP" in
              major) next="v$((major+1)).0.0" ;;
              minor) next="v${major}.$((minor+1)).0" ;;
              patch) next="v${major}.${minor}.$((patch+1))" ;;
              *) echo "unknown bump: $BUMP" >&2; exit 1 ;;
            esac
          fi
          echo "previous: ${latest:-none}"
          echo "next:     $next"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$next" -m "release $next"
          git push origin "$next"
