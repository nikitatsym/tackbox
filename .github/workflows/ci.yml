name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./go/...
      - run: go vet ./go/...
      # erclint-opengrep hardening tests build the wrapper and exercise it
      # end-to-end, so opengrep must be on PATH before `go test`.
      - name: Install opengrep
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/opengrep/opengrep/releases/latest/download/opengrep_manylinux_x86 -o /usr/local/bin/opengrep
          chmod +x /usr/local/bin/opengrep
          opengrep --version
      - run: go test -race ./go/...
      - run: go run ./go/cmd/erclint ./go/...
      - run: go run ./go/cmd/erclint-opengrep ./go
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --no-audit --no-fund
      # py e2e fixture tests drive every engine; keep after go/opengrep/node setup
      - uses: astral-sh/setup-uv@v5
      - run: uv run --directory py --with pytest --with pyyaml pytest -q
      - run: npm test
      - run: node ./bin/tackbox-eslint.js js/eslint-plugin.js js/report.js js/rules bin
      - run: node ./bin/tackbox-mdlint.js README.md go/README.md js/README.md

  tag:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ssh-key = deploy key with write access. A tag pushed via the default
      # GITHUB_TOKEN does not trigger downstream workflows (documented
      # anti-recursion rule), so publish.yml would never wake on tag events
      # produced by this job. Deploy key is scoped to this repo, no user PAT.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_TAG_KEY }}
      - name: Bump and push tag
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          latest=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            ver=${latest#v}
            major=${ver%%.*}
            rest=${ver#*.}
            minor=${rest%%.*}
            patch=${rest#*.}
            case "$BUMP" in
              major) next="v$((major+1)).0.0" ;;
              minor) next="v${major}.$((minor+1)).0" ;;
              patch) next="v${major}.${minor}.$((patch+1))" ;;
              *) echo "unknown bump: $BUMP" >&2; exit 1 ;;
            esac
          fi
          echo "previous: ${latest:-none}"
          echo "next:     $next"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$next" -m "release $next"
          git push origin "$next"
