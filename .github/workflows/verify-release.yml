name: verify-release

# Canary against live PyPI, split out so CDN convergence never colors publish.
on:
  workflow_run:
    workflows: [publish]
    types: [completed]
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "version to verify (empty = latest)"
        required: false
        default: ""

concurrency:
  group: verify-release
  cancel-in-progress: true

jobs:
  target:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    outputs:
      uvx: ${{ steps.pick.outputs.uvx }}
      pip: ${{ steps.pick.outputs.pip }}
      version: ${{ steps.pick.outputs.version }}
    steps:
      - id: pick
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version=""
          case "${GITHUB_EVENT_NAME}" in
            workflow_run) version="${HEAD_BRANCH#v}" ;;
            workflow_dispatch) version="${INPUT_VERSION}" ;;
          esac
          # Pin scheduled/latest runs to one number up front: canary and badge
          # must agree on the version even if a release lands mid-run.
          if [ -z "$version" ]; then
            version=$(curl -fsSL https://pypi.org/pypi/tackbox/json \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["info"]["version"])')
          fi
          echo "version=$version"          >> "$GITHUB_OUTPUT"
          echo "uvx=tackbox@${version}"    >> "$GITHUB_OUTPUT"
          echo "pip=tackbox==${version}"   >> "$GITHUB_OUTPUT"

  canary:
    name: canary ${{ matrix.platform }}
    needs: target
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 80
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-22.04
          - platform: linux-aarch64
            runner: ubuntu-22.04-arm
          - platform: macos-aarch64
            runner: macos-14
          - platform: windows-x86_64
            runner: windows-2022
    steps:
      - uses: actions/checkout@v4

      # macos-14 ships no Go; doctor's go-toolchain check needs it.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: astral-sh/setup-uv@v5

      - name: Materialize fixture repo
        shell: bash
        run: |
          set -euo pipefail
          rm -rf fixture-repo
          python scripts/materialize_fixture.py fixture-repo

      # Only uv's own resolve proves visibility; HTML/JSON index variants drift.
      # --python-version: runner's ambient python can sit below requires-python.
      - name: Wait until uv can resolve ${{ needs.target.outputs.pip }}
        shell: bash
        env:
          PIP_SPEC: ${{ needs.target.outputs.pip }}
        run: |
          set -euo pipefail
          out=""
          for i in $(seq 1 360); do
            if out=$(echo "${PIP_SPEC}" | uv pip compile --refresh --no-header -q --python-version 3.11 - 2>&1); then
              echo "${PIP_SPEC} resolvable after $(((i - 1) * 10))s"
              exit 0
            fi
            if [ $((i % 30)) -eq 0 ]; then
              echo "still not visible after $((i * 10))s"
            fi
            sleep 10
          done
          echo "${PIP_SPEC} not resolvable after 3600s; last resolver error:" >&2
          echo "$out" >&2
          exit 1

      # --refresh bypasses cached tool installs even on a re-run.
      - name: uvx doctor
        shell: bash
        working-directory: fixture-repo
        env:
          UVX_SPEC: ${{ needs.target.outputs.uvx }}
        run: |
          set -euo pipefail
          uvx --refresh "${UVX_SPEC}" doctor

      - name: uvx lint (expect exit 1)
        shell: bash
        working-directory: fixture-repo
        env:
          UVX_SPEC: ${{ needs.target.outputs.uvx }}
        run: |
          set -eo pipefail
          set +e
          uvx --refresh "${UVX_SPEC}" lint . --no-cache
          rc=$?
          set -e
          echo "lint exit=$rc"
          if [ "$rc" != "1" ]; then
            echo "expected exit 1 on fixture violations, got $rc" >&2
            exit 1
          fi

  badge:
    name: pypi badge
    needs: [target, canary]
    # Red on canary failure is the point, so always(); a cancelled canary
    # (superseded by a newer release) must not stamp a stale verdict, and a
    # manual re-verify of a pinned old version must not roll the badge back
    # (bare dispatch pins to latest, so it may stamp - handy for reseeding).
    if: >-
      always() && needs.canary.result != 'cancelled' && needs.canary.result != 'skipped'
      && (github.event_name != 'workflow_dispatch' || inputs.version == '')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # The badges branch is written only here, never by hand: green means a
      # canary actually passed. README serves it via raw.githubusercontent
      # (max-age=300), so it escapes the 3h shields+camo cache stack that
      # keeps img.shields.io/pypi/v badges hours behind.
      - name: Render badge and push to badges branch
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.canary.result }}
          VERSION: ${{ needs.target.outputs.version }}
        run: |
          set -euo pipefail
          if [ "$RESULT" = "success" ]; then
            color=brightgreen
            text="v${VERSION} verified"
          else
            color=red
            text="v${VERSION} canary failed"
          fi
          # shields static-badge escaping: literal dash doubles, space is underscore
          msg=$(printf '%s' "$text" | sed 's/-/--/g; s/ /_/g')
          curl -fsSL "https://img.shields.io/badge/pypi-${msg}-${color}" -o pypi.svg
          mkdir badge-branch
          mv pypi.svg badge-branch/
          cd badge-branch
          git init -q -b badges
          git config user.name "github-actions[bot]"
          git config user.email "41898270+github-actions[bot]@users.noreply.github.com"
          git add pypi.svg
          git commit -qm "pypi badge: ${text}"
          # Single disposable commit each time; badge history is pure noise.
          git push -qf "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges

  status:
    name: commit status
    needs: canary
    if: always() && github.event_name == 'workflow_run' && needs.canary.result != 'cancelled'
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    steps:
      # Tag- and workflow_run-runs are invisible on the main commit list;
      # attach the canary verdict to the tagged commit so it shows there.
      - name: Post verify-release status to the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          RESULT: ${{ needs.canary.result }}
        run: |
          set -euo pipefail
          if [ "$RESULT" = "success" ]; then state="success"; else state="failure"; fi
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
            -f state="$state" -f context="verify-release" \
            -f description="fresh-runner canary: ${RESULT}" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
