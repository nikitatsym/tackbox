name: wheels

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  wheels:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-22.04
          - platform: linux-aarch64
            runner: ubuntu-22.04-arm
          - platform: macos-aarch64
            runner: macos-14
          - platform: windows-x86_64
            runner: windows-2022
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # build_wheels.py packs the shaded javalint.jar via `mvn package`; maven
      # is pre-installed on all runner images, setup-java supplies the JDK.
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Build wheels for ${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_wheels.py \
            --outdir dist \
            --version 0.0.0 \
            --platform ${{ matrix.platform }}
          ls -lh dist/

      - name: Enforce PyPI 100 MiB per-file limit
        shell: bash
        run: |
          set -euo pipefail
          limit=$((100 * 1024 * 1024))
          fail=0
          for w in dist/*.whl; do
            size=$(wc -c <"$w")
            printf '%s\t%s bytes\n' "$w" "$size"
            if [ "$size" -gt "$limit" ]; then
              echo "wheel $w exceeds PyPI 100 MiB per-file limit: $size bytes" >&2
              fail=1
            fi
          done
          exit "$fail"

      - name: Install thin wheel; stage engines payload from the built fat wheel
        shell: bash
        run: |
          set -euo pipefail
          uv venv --python 3.11 .wheels-venv
          fat=$(ls dist/tackbox_engines-*.whl | head -n1)
          thin=$(ls dist/tackbox-0.0.0-*.whl | grep -v tackbox_engines | head -n1)
          echo "fat=$fat"
          echo "thin=$thin"
          # Thin installs alone: F6 dropped the fat pip dependency.
          uv pip install --python .wheels-venv "$thin"
          # The store can't fetch an unpublished version; supply the payload by
          # unpacking the just-built fat wheel and overriding TACKBOX_ENGINES_DIR.
          python -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]).extractall('engines-payload')" "$fat"
          chmod -R u+x engines-payload/tackbox_engines/bin || true
          echo "TACKBOX_ENGINES_DIR=$PWD/engines-payload/tackbox_engines" >> "$GITHUB_ENV"

      - name: Materialize fixture repo
        shell: bash
        run: |
          set -euo pipefail
          rm -rf fixture-repo
          python scripts/materialize_fixture.py fixture-repo

      - name: tackbox doctor (expect exit 0)
        shell: bash
        working-directory: fixture-repo
        run: |
          set -euo pipefail
          if [ -f ../.wheels-venv/bin/tackbox ]; then
            tackbox=../.wheels-venv/bin/tackbox
          elif [ -f ../.wheels-venv/Scripts/tackbox.exe ]; then
            tackbox=../.wheels-venv/Scripts/tackbox.exe
          else
            echo "no tackbox entrypoint found under .wheels-venv/" >&2
            exit 1
          fi
          "$tackbox" doctor

      - name: tackbox lint (expect exit 1 on planted violations)
        shell: bash
        working-directory: fixture-repo
        run: |
          set -eo pipefail
          if [ -f ../.wheels-venv/bin/tackbox ]; then
            tackbox=../.wheels-venv/bin/tackbox
          elif [ -f ../.wheels-venv/Scripts/tackbox.exe ]; then
            tackbox=../.wheels-venv/Scripts/tackbox.exe
          else
            echo "no tackbox entrypoint found under .wheels-venv/" >&2
            exit 1
          fi
          set +e
          "$tackbox" lint . --no-cache
          rc=$?
          set -e
          echo "lint exit=$rc"
          if [ "$rc" != "1" ]; then
            echo "expected exit 1 (planted ERC001+no-swallow-catch+MD-ASCII), got $rc" >&2
            exit 1
          fi

      - name: Upload wheels artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7
